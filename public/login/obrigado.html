<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedido enviado</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-950">
    <main class="mx-auto grid min-h-screen w-full max-w-xl place-items-center px-5 py-10">
      <section class="w-full rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-xl shadow-slate-300/30">
        <div class="mx-auto grid h-16 w-16 place-items-center rounded-2xl bg-emerald-700 text-2xl font-black text-white">OK</div>
        <h1 class="mt-6 text-2xl font-black text-slate-950">Pedido enviado</h1>
        <p class="mt-3 text-sm font-semibold leading-6 text-slate-600">Seu pedido de acesso foi registrado. Aguarde a avaliação e liberação do administrador.</p>
        <a href="/login/" class="mt-6 inline-flex h-11 items-center justify-center rounded-lg bg-slate-950 px-5 text-sm font-black text-white transition hover:bg-slate-700">Voltar para o sistema</a>
      </section>
    </main>
  </body>
</html>
