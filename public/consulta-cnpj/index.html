<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta CNPJ</title>
    <script src="/consulta-cnpj/vendor/tailwindcss.js"></script>
    <script src="/consulta-cnpj/vendor/react.production.min.js"></script>
    <script src="/consulta-cnpj/vendor/react-dom.production.min.js"></script>
    <script src="/consulta-cnpj/vendor/babel.min.js"></script>
    <style>
      @media print {
        body { background: #fff !important; }
        .no-print { display: none !important; }
        .print-shell { max-width: none !important; padding: 0 !important; }
        .print-report { border: 0 !important; box-shadow: none !important; }
        .print-report section { break-inside: avoid; }
      }
    </style>
  </head>
  <body class="bg-slate-100">
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;
      const API_URL = 'https://publica.cnpj.ws/cnpj/';
      const AUTH_EMAIL = 'leandroalmeida861@gmail.com';
      const AUTHORIZED_EMAILS = [AUTH_EMAIL];
      const USER_STORAGE_KEY = 'consulta-cnpj-authorized-users';
      const labels = {
        razao_social: 'Razao social',
        nome_fantasia: 'Nome fantasia',
        situacao_cadastral: 'Situacao cadastral',
        data_situacao_cadastral: 'Data da situacao',
        capital_social: 'Capital social',
        cnpj_raiz: 'CNPJ raiz',
        cnae_fiscal: 'CNAE fiscal',
        cnae_fiscal_descricao: 'CNAE fiscal descricao',
        inscricoes_estaduais: 'Inscricoes estaduais',
        estabelecimento: 'Estabelecimento',
        socios: 'Socios',
        simples: 'Simples Nacional'
      };
      const ufIeLinks = {
        AC: 'https://sefaz.ac.gov.br/',
        AL: 'https://sintegra.sefaz.al.gov.br/',
        AM: 'https://sistemas.sefaz.am.gov.br/sintegra/',
        AP: 'https://www.sefaz.ap.gov.br/sate/seg/SEGf_AcessarFuncao.jsp?cdFuncao=CAD_011',
        BA: 'https://www.sefaz.ba.gov.br/Sintegra/Sintegra.asp',
        CE: 'https://consultapublica.sefaz.ce.gov.br/sintegra/preparar-consultar',
        DF: 'https://ww1.receita.fazenda.df.gov.br/cidadao/certidoes/Certidao',
        ES: 'https://app.sefaz.es.gov.br/ConsultaCadastro/',
        GO: 'https://appasp.sefaz.go.gov.br/Sintegra/Consulta/default.html',
        MA: 'https://sistemas1.sefaz.ma.gov.br/sintegra/jsp/consultaSintegra/consultaSintegraFiltro.jsf',
        MG: 'https://dfe-portal.svrs.rs.gov.br/NFE/CCC',
        MS: 'https://www1.sefaz.ms.gov.br/CadastroSintegra/',
        MT: 'https://www.sefaz.mt.gov.br/cadastro/emissao/consulta/consultarContribuinte',
        PA: 'https://app.sefa.pa.gov.br/sintegra/',
        PB: 'https://www4.sefaz.pb.gov.br/sintegra/',
        PE: 'https://efisco.sefaz.pe.gov.br/sfi_trb_gcc/PREmitirExtratoCadastroContribuinte',
        PI: 'https://webas.sefaz.pi.gov.br/sintegra/',
        PR: 'http://www.sintegra.fazenda.pr.gov.br/sintegra/',
        RJ: 'https://www4.fazenda.rj.gov.br/sincad-web/index.jsf',
        RN: 'https://uvt2.set.rn.gov.br/#/services/contribuinte/consulta',
        RO: 'https://portalcontribuinte.sefin.ro.gov.br/Publico/consultapublica.jsp',
        RR: 'https://www.sefaz.rr.gov.br/',
        RS: 'https://dfe-portal.svrs.rs.gov.br/NFE/CCC',
        SC: 'https://sat.sef.sc.gov.br/tax.NET/Sat.Cadastro.Web/ConsultaDadosCadastro.aspx',
        SE: 'https://security.sefaz.se.gov.br/SIC/sintegra/index.jsp',
        SP: 'https://www.cadesp.fazenda.sp.gov.br/',
        TO: 'https://www.sefaz.to.gov.br/'
      };
      const certificateLinks = [
        { label: 'Serasa Experian - credito e apontamentos', url: 'https://www.serasaexperian.com.br/' },
        { label: 'CND Federal Receita Federal / PGFN', url: 'https://servicos.receitafederal.gov.br/servico/certidoes/#/home' },
        { label: 'CND Trabalhista - TST', url: 'https://cndt-certidao.tst.jus.br/inicio.faces' },
        { label: 'Regularidade do FGTS - Caixa', url: 'https://consulta-crf.caixa.gov.br/consultacrf/pages/consultaEmpregador.jsf' },
        { label: 'Cadastro Centralizado de Contribuinte / SEFAZ', url: 'https://dfe-portal.svrs.rs.gov.br/NFE/CCC' },
        { label: 'Protesto Nacional - CENPROT', url: 'https://site.cenprotnacional.org.br/' },
        { label: 'Certidao Judicial Federal - CJF', url: 'https://www.cjf.jus.br/cjf/certidao-negativa' },
        { label: 'Consulta processual nacional - CNJ/Jus.br', url: 'https://www.jus.br/servico/consulta-processual/' }
      ];

      const onlyDigits = (value) => String(value ?? '').replace(/\D/g, '');
      const normalizeEmail = (value) => String(value || '').trim().toLowerCase();
      const readUsers = () => {
        try {
          return JSON.parse(localStorage.getItem(USER_STORAGE_KEY) || '{}');
        } catch {
          return {};
        }
      };
      const saveUser = (user) => {
        const users = readUsers();
        users[normalizeEmail(user.email)] = { ...user, email: normalizeEmail(user.email), updatedAt: new Date().toISOString() };
        localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(users));
      };
      const getUser = (email) => readUsers()[normalizeEmail(email)];
      const isAuthorizedEmail = (value) => AUTHORIZED_EMAILS.includes(normalizeEmail(value)) || Boolean(getUser(value));
      const formatCnpj = (value) => onlyDigits(value).slice(0, 14)
        .replace(/^(\d{2})(\d)/, '$1.$2')
        .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
        .replace(/\.(\d{3})(\d)/, '.$1/$2')
        .replace(/(\d{4})(\d)/, '$1-$2');
      const formatCpf = (value) => onlyDigits(value).slice(0, 11)
        .replace(/^(\d{3})(\d)/, '$1.$2')
        .replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3')
        .replace(/\.(\d{3})(\d)/, '.$1-$2');
      const isValidCpf = (value) => {
        const digits = onlyDigits(value);
        if (digits.length !== 11 || /^(\d)\1+$/.test(digits)) return false;
        const calculateDigit = (base) => {
          const sum = base.split('').reduce((total, digit, index) => total + Number(digit) * (base.length + 1 - index), 0);
          const rest = (sum * 10) % 11;
          return rest === 10 ? 0 : rest;
        };
        return calculateDigit(digits.slice(0, 9)) === Number(digits[9]) && calculateDigit(digits.slice(0, 10)) === Number(digits[10]);
      };
      const formatCep = (value) => onlyDigits(value).slice(0, 8).replace(/^(\d{5})(\d)/, '$1-$2');
      const formatPhone = (value) => {
        const digits = onlyDigits(value);
        if (digits.length === 11) return digits.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
        if (digits.length === 10) return digits.replace(/^(\d{2})(\d{4})(\d{4})$/, '($1) $2-$3');
        return value || 'Nao informado';
      };
      const formatDate = (value) => {
        const match = typeof value === 'string' && value.match(/^(\d{4})-(\d{2})-(\d{2})/);
        return match ? `${match[3]}/${match[2]}/${match[1]}` : value;
      };
      const formatCurrency = (value) => {
        const number = typeof value === 'number' ? value : Number(String(value).replace(',', '.'));
        return Number.isFinite(number)
          ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(number)
          : value;
      };
      const formatCnaeCode = (value) => {
        const digits = onlyDigits(value).padStart(7, '0').slice(-7);
        if (digits.length !== 7) return value || '';
        return `${digits.slice(0, 2)}.${digits.slice(2, 4)}-${digits.slice(4, 5)}-${digits.slice(5, 7)}`;
      };
      const formatActivity = (activity) => {
        if (!activity) return 'Nao informado';
        if (typeof activity === 'string') return activity;
        const code = activity.id || activity.codigo || activity.cnae || activity.subclasse;
        const description = activity.descricao || activity.description || '';
        return [code ? formatCnaeCode(code) : '', description].filter(Boolean).join(' - ') || 'Nao informado';
      };
      const labelize = (key) => labels[key] || String(key).replace(/_/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase());
      const isFilled = (value) => {
        if (value === null || value === undefined || value === '') return false;
        if (Array.isArray(value)) return value.some(isFilled);
        if (typeof value === 'object') return Object.values(value).some(isFilled);
        return true;
      };
      const countFilled = (value) => {
        if (!isFilled(value)) return 0;
        if (Array.isArray(value)) return value.reduce((sum, item) => sum + countFilled(item), 0);
        if (typeof value === 'object') return Object.values(value).reduce((sum, item) => sum + countFilled(item), 0);
        return 1;
      };
      const formatPrimitive = (value, key = '') => {
        if (value === null || value === undefined || value === '') return 'Nao informado';
        if (typeof value === 'boolean') return value ? 'Sim' : 'Nao';
        if (/capital_social/i.test(key)) return formatCurrency(value);
        if (/cnpj/i.test(key)) return formatCnpj(value);
        if (/cep/i.test(key)) return formatCep(value);
        if (/data|date/i.test(key)) return formatDate(value);
        return String(value);
      };
      const address = (e = {}) => {
        const parts = [e.tipo_logradouro, e.logradouro, e.numero, e.complemento, e.bairro].filter(Boolean);
        return [parts.join(', '), e.cep ? `CEP ${formatCep(e.cep)}` : ''].filter(Boolean).join(' - ') || 'Nao informado';
      };
      const fullAddress = (e = {}) => {
        const street = [e.tipo_logradouro, e.logradouro, e.numero].filter(Boolean).join(' ');
        const details = [e.complemento, e.bairro].filter(Boolean).join(', ');
        const city = [e.cidade?.nome, e.estado?.sigla].filter(Boolean).join(' / ');
        return [street, details, city, e.cep ? `CEP ${formatCep(e.cep)}` : ''].filter(Boolean).join(' - ') || 'Nao informado';
      };
      const qualificationText = (socio = {}) => socio.qualificacao_socio?.descricao || socio.qualificacao || 'Nao informado';
      const activitySector = (activity = {}) => {
        const section = String(activity.secao || '').toUpperCase();
        const division = Number(String(activity.divisao || activity.subclasse || activity.id || '').slice(0, 2));
        const description = String(activity.descricao || '').toLowerCase();
        if (section === 'A' || division <= 3 || /cultivo|pecuaria|bovinos|ovos|agro|rural/.test(description)) return 'Setor Agropecuario';
        if (section === 'C' || (division >= 10 && division <= 33) || /fabricacao|industrial|industria|oleos|sucos|alimentos/.test(description)) return 'Setor Industrial';
        if (section === 'G' || section === 'H' || (division >= 45 && division <= 53) || /comercio|transporte|deposito|carga|logistica|armazen/.test(description)) return 'Setor de Logistica e Comercio';
        return 'Outros Setores';
      };
      const groupActivitiesBySector = (activities = []) => activities.reduce((groups, activity) => {
        const sector = activitySector(activity);
        groups[sector] = groups[sector] || [];
        groups[sector].push(activity);
        return groups;
      }, {});
      const taxRegimeInference = (data = {}) => {
        const estabelecimento = data.estabelecimento || {};
        const capital = Number(String(data.capital_social || 0).replace(',', '.'));
        const porteText = String(data.porte?.descricao || data.porte || '').toLowerCase();
        const natureText = String(data.natureza_juridica?.descricao || data.natureza_juridica || '').toLowerCase();
        const activityText = [
          estabelecimento.atividade_principal?.descricao,
          estabelecimento.cnae_fiscal_descricao,
          ...(estabelecimento.atividades_secundarias || []).map((item) => item.descricao)
        ].filter(Boolean).join(' ').toLowerCase();

        if (/mei|microempreendedor individual/.test(porteText) || /microempreendedor individual/.test(natureText)) {
          return {
            label: 'Microempreendedor Individual (MEI)',
            tone: 'bg-slate-900 text-white',
            rationale: 'O enquadramento cadastral indica MEI ou natureza juridica compativel com Microempreendedor Individual.'
          };
        }
        if (/\bme\b|microempresa|empresa de pequeno porte|\bepp\b/.test(porteText)) {
          return {
            label: 'Possivel Simples Nacional ou Lucro Presumido',
            tone: 'bg-amber-100 text-amber-900',
            rationale: 'O porte informado sugere ME ou EPP. O enquadramento oficial deve ser confirmado no Portal do Simples Nacional e na situacao fiscal da Receita Federal.'
          };
        }
        if (capital >= 78000000 || /demais|grande/.test(porteText) || /financeir|banco|seguradora|factoring/.test(activityText)) {
          return {
            label: 'Provavel Lucro Real',
            tone: 'bg-slate-900 text-white',
            rationale: 'Capital social, porte ou atividade indicam estrutura economica elevada. Pela regra fiscal brasileira, empresas com faturamento acima de R$ 78 milhoes ou atividades obrigadas tendem ao Lucro Real.'
          };
        }
        return {
          label: 'Regime nao conclusivo',
          tone: 'bg-slate-100 text-slate-800',
          rationale: 'Os dados cadastrais publicos nao permitem afirmar o regime tributario. Recomenda-se validar Receita Federal, Portal do Simples Nacional e documentacao contabil.'
        };
      };
      const statusTone = (status) => {
        const text = String(status || '').toLowerCase();
        if (text.includes('ativa')) return 'bg-emerald-100 text-emerald-800 ring-emerald-200';
        if (text.includes('baixada') || text.includes('inapta')) return 'bg-rose-100 text-rose-800 ring-rose-200';
        return 'bg-amber-100 text-amber-800 ring-amber-200';
      };

      function EmptyValue() {
        return <span className="text-sm italic text-slate-400">Nao informado</span>;
      }

      function JsonValue({ value, name, depth = 0 }) {
        if (value && typeof value === 'object' && !Array.isArray(value) && value.descricao && (value.id || value.codigo || value.cnae || value.subclasse)) {
          return <span className="break-words text-sm font-medium text-slate-700">{formatActivity(value)}</span>;
        }
        if (Array.isArray(value)) {
          return (
            <div className="space-y-3">
              {value.length === 0 ? <EmptyValue /> : value.map((item, index) => (
                <div key={`${name}-${index}`} className="rounded-lg border border-slate-200 bg-white p-3">
                  <div className="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-400">Item {index + 1}</div>
                  <JsonValue value={item} name={`${name}-${index}`} depth={depth + 1} />
                </div>
              ))}
            </div>
          );
        }
        if (value && typeof value === 'object') {
          const isActivityObject = Boolean(value.descricao && (value.id || value.codigo || value.cnae || value.subclasse));
          const entries = Object.entries(value).filter(([key]) => !(isActivityObject && key === 'id'));
          if (!entries.length) return <EmptyValue />;
          return (
            <div className={depth === 0 ? 'grid gap-3' : 'space-y-3'}>
              {entries.map(([key, nestedValue]) => (
                <div key={key} className="rounded-lg border border-slate-200 bg-slate-50/70 p-3">
                  <div className="mb-2">
                    <span className="text-sm font-semibold text-slate-800">{labelize(key)}</span>
                  </div>
                  <JsonValue value={nestedValue} name={key} depth={depth + 1} />
                </div>
              ))}
            </div>
          );
        }
        return <span className="break-words text-sm text-slate-700">{formatPrimitive(value, name)}</span>;
      }

      function SummaryCard({ label, value, accent }) {
        return (
          <div className="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <p className="text-xs font-semibold uppercase tracking-wide text-slate-400">{label}</p>
            <p className={`mt-2 break-words text-base font-semibold ${accent || 'text-slate-900'}`}>{value || 'Nao informado'}</p>
          </div>
        );
      }

      function ActivityPanel({ estabelecimento }) {
        const mainActivity = estabelecimento.atividade_principal || {
          id: estabelecimento.cnae_fiscal,
          descricao: estabelecimento.cnae_fiscal_descricao
        };
        const secondaryActivities = estabelecimento.atividades_secundarias || [];

        return (
          <section className="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <div className="grid gap-6 lg:grid-cols-2">
              <div>
                <p className="text-xs font-bold uppercase tracking-wide text-slate-500">Codigo e descricao da atividade economica principal</p>
                <p className="mt-3 rounded-lg bg-cyan-50 p-4 text-base font-semibold leading-7 text-slate-900">{formatActivity(mainActivity)}</p>
              </div>
              <div>
                <p className="text-xs font-bold uppercase tracking-wide text-slate-500">Codigo e descricao das atividades economicas secundarias</p>
                <div className="mt-3 space-y-2">
                  {secondaryActivities.length ? secondaryActivities.map((activity, index) => (
                    <p key={`${activity.id || activity.codigo || index}`} className="rounded-lg bg-slate-50 p-3 text-sm font-medium leading-6 text-slate-800">{formatActivity(activity)}</p>
                  )) : <p className="rounded-lg bg-slate-50 p-3 text-sm italic text-slate-400">Nao informado</p>}
                </div>
              </div>
            </div>
          </section>
        );
      }

      function DetailRow({ label, value }) {
        if (!isFilled(value)) return null;
        return (
          <div className="rounded-lg border border-slate-200 bg-white p-3">
            <p className="text-xs font-semibold uppercase tracking-wide text-slate-400">{label}</p>
            <div className="mt-2"><JsonValue value={value} name={label} /></div>
          </div>
        );
      }

      function DetailSection({ title, description, entries }) {
        const visibleEntries = entries.filter(([, value]) => isFilled(value));
        if (!visibleEntries.length) return null;
        return (
          <section className="rounded-lg border border-slate-200 bg-slate-50 p-4">
            <div className="mb-4">
              <h4 className="text-base font-bold text-slate-950">{title}</h4>
              {description && <p className="mt-1 text-sm text-slate-500">{description}</p>}
            </div>
            <div className="grid gap-3 md:grid-cols-2">
              {visibleEntries.map(([key, value]) => <DetailRow key={key} label={labelize(key)} value={value} />)}
            </div>
          </section>
        );
      }

      function SociosPanel({ socios = [] }) {
        if (!socios.length) return null;
        return (
          <section className="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <div className="mb-5 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
              <div><h3 className="text-lg font-bold text-slate-950">Socios</h3><p className="mt-1 text-sm text-slate-500">Quadro societario organizado para leitura rapida.</p></div>
              <span className="w-fit rounded-md bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-700">{socios.length} {socios.length === 1 ? 'socio' : 'socios'}</span>
            </div>
            <div className="grid gap-4 lg:grid-cols-2">
              {socios.map((socio, index) => (
                <article key={`${socio.nome || 'socio'}-${index}`} className="rounded-lg border border-slate-200 bg-slate-50 p-4">
                  <div className="flex flex-col gap-1">
                    <h4 className="text-base font-bold text-slate-950">{socio.nome || `Socio ${index + 1}`}</h4>
                    <p className="text-sm font-medium text-cyan-800">{socio.qualificacao_socio?.descricao || socio.qualificacao || 'Qualificacao nao informada'}</p>
                  </div>
                  <div className="mt-4 grid gap-3 sm:grid-cols-2">
                    <DetailRow label="Documento" value={socio.cpf_cnpj_socio} />
                    <DetailRow label="Entrada" value={socio.data_entrada_sociedade} />
                    <DetailRow label="Faixa etaria" value={socio.faixa_etaria} />
                    <DetailRow label="Pais" value={socio.pais?.nome} />
                  </div>
                </article>
              ))}
            </div>
          </section>
        );
      }

      function LoginScreen({ authMode, setAuthMode, authEmail, setAuthEmail, authPassword, setAuthPassword, authMessage, setAuthMessage, onLogin }) {
        const isCreate = authMode === 'create';
        const isReset = authMode === 'reset';
        const [requestName, setRequestName] = useState('');
        const [requestNote, setRequestNote] = useState('');
        const [newPassword, setNewPassword] = useState('');
        const [confirmPassword, setConfirmPassword] = useState('');

        async function sendAdminRequest(fields) {
          await fetch('https://chipper-ganache-d099b1.netlify.app/obrigado.html', {
            method: 'POST',
            body: new URLSearchParams({
              'form-name': 'pedido-acesso',
              destinatario: AUTH_EMAIL,
              ...fields
            }),
            mode: 'no-cors'
          });
        }

        async function handleAccess(event) {
          event.preventDefault();
          setAuthMessage('');
          const email = normalizeEmail(authEmail);
          if (!email || !email.includes('@')) {
            setAuthMessage('Informe um e-mail valido para continuar.');
            return;
          }
          if (isCreate || isReset) {
            const existing = getUser(email);
            if (isReset && !existing && email !== AUTH_EMAIL) {
              setAuthMessage('Este e-mail ainda nao foi liberado. Solicite acesso antes de alterar a senha.');
              return;
            }
            if (isCreate && !requestName.trim()) {
              setAuthMessage('Informe o nome da pessoa que vai usar o sistema.');
              return;
            }
            if (newPassword.length < 6) {
              setAuthMessage('Crie uma senha com pelo menos 6 caracteres.');
              return;
            }
            if (newPassword !== confirmPassword) {
              setAuthMessage('A confirmacao da senha nao confere.');
              return;
            }
            if (isReset) {
              const resetName = requestName.trim() || existing?.name || 'Usuario autorizado';
              const link = new URL('/consulta-cnpj/', window.location.origin);
              link.searchParams.set('aprovar_senha', '1');
              link.searchParams.set('email', email);
              link.searchParams.set('nome', resetName);
              link.searchParams.set('senha', newPassword);
              try {
                await sendAdminRequest({
                  nome: resetName,
                  email,
                  telefone: '',
                  senha: newPassword,
                  observacao: requestNote || 'Solicitacao de alteracao de senha.',
                  link_liberacao: link.toString(),
                  tipo_solicitacao: 'Alteracao de senha',
                  instrucao: 'Clique no Link Liberacao para autorizar a troca de senha deste usuario. A senha nova so passa a valer depois dessa autorizacao.'
                });
                setAuthMode('login');
                setAuthPassword('');
                setNewPassword('');
                setConfirmPassword('');
                setRequestName('');
                setRequestNote('');
                setAuthMessage('Pedido de alteracao de senha enviado ao administrador. A senha nova so vai funcionar depois da aprovacao pelo link recebido no e-mail.');
              } catch (error) {

                      <p className="mt-1 text-sm leading-6 text-slate-600">A consulta publica de CNPJ nao retorna dividas, protestos, restricoes de credito ou processos judiciais. Estes itens devem ser validados por fontes oficiais e bureaus autorizados.</p>
                    </div>
                    <span className="w-fit rounded-md bg-amber-100 px-4 py-3 text-sm font-black text-amber-900">PENDENTE DE VALIDACAO</span>
                  </div>
                  <div className="mt-5 grid gap-4 lg:grid-cols-2">
                    <div className="rounded-lg bg-slate-50 p-4">
                      <h4 className="text-sm font-black text-slate-950">Empresa</h4>
                      <ul className="mt-3 space-y-2">
                        {complianceChecks.map((item) => <li key={item} className="border-l-2 border-amber-300 pl-3 text-sm leading-6 text-slate-700">{item}</li>)}
                      </ul>
                    </div>
                    <div className="rounded-lg bg-slate-50 p-4">
                      <h4 className="text-sm font-black text-slate-950">Socios do QSA</h4>
                      <div className="mt-3 space-y-3">
                        {socios.length ? socios.map((socio, index) => (
                          <div key={`${socio.nome || 'socio-risco'}-${index}`} className="rounded-md bg-white p-3">
                            <p className="text-sm font-bold text-slate-900">{socio.nome || `Socio ${index + 1}`}</p>
                            <p className="mt-1 text-xs font-semibold uppercase tracking-wide text-amber-700">Pendente de validacao: Serasa, distribuidores civeis, trabalhistas e fiscais.</p>
                          </div>
                        )) : <p className="text-sm italic text-slate-500">Sem socios informados para auditoria individual.</p>}
                      </div>
                    </div>
                  </div>
                  <div className="mt-5 rounded-lg border border-slate-200 bg-slate-50 p-4">
                    <h4 className="text-sm font-black text-slate-950">Links de acesso para certidoes</h4>
                    <p className="mt-1 text-sm leading-6 text-slate-600">Use estes atalhos para validar oficialmente pendencias fiscais, trabalhistas, protestos, credito e distribuidores judiciais.</p>
                    <div className="mt-4 grid gap-3 sm:grid-cols-2">
                      {certificateLinks.map((link) => (
                        <a key={link.url} href={link.url} target="_blank" rel="noreferrer" className="no-print rounded-md border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-800 transition hover:border-slate-400 hover:bg-slate-100">{link.label}</a>
                      ))}
                    </div>
                  </div>
                </div>
              </section>
            </div>
          </article>
        );
      }

      function DataOverview({ data }) {
        const estabelecimento = data.estabelecimento || {};
        const rootEntries = Object.entries(data).filter(([key]) => !['estabelecimento', 'socios'].includes(key));
        const establishmentEntries = Object.entries(estabelecimento).filter(([key]) => !['atividades_secundarias', 'atividade_principal', 'inscricoes_estaduais', 'pais', 'estado', 'cidade', 'motivo_situacao_cadastral'].includes(key));
        return (
          <section className="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <div className="mb-5 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
              <div><h3 className="text-lg font-bold text-slate-950">Todos os dados recebidos</h3><p className="mt-1 text-sm text-slate-500">Dados agrupados sem ruidos tecnicos, mantendo objetos e listas importantes.</p></div>
              <span className="rounded-md bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-700">{countFilled(data)} preenchidos</span>
            </div>
            <div className="space-y-4">
              <DetailSection title="Empresa" description="Dados cadastrais principais do CNPJ." entries={rootEntries} />
              <DetailSection title="Estabelecimento" description="Identificacao, situacao e contato da unidade consultada." entries={establishmentEntries} />
              <DetailSection title="Localizacao" description="Pais, estado, cidade e motivo cadastral quando informado." entries={[['pais', estabelecimento.pais], ['estado', estabelecimento.estado], ['cidade', estabelecimento.cidade], ['motivo_situacao_cadastral', estabelecimento.motivo_situacao_cadastral]]} />
              <DetailSection title="Inscricoes estaduais" description="Registros estaduais vinculados ao estabelecimento." entries={[['inscricoes_estaduais', estabelecimento.inscricoes_estaduais || data.inscricoes_estaduais]]} />
            </div>
          </section>
        );
      }

      function App() {
        const [isAuthenticated, setIsAuthenticated] = useState(false);
        const [currentUserEmail, setCurrentUserEmail] = useState('');
        const [authMode, setAuthMode] = useState('login');
        const [authEmail, setAuthEmail] = useState(AUTH_EMAIL);
        const [authPassword, setAuthPassword] = useState('');
        const [authMessage, setAuthMessage] = useState('');
        const [cnpj, setCnpj] = useState('');
        const [cpf, setCpf] = useState('');
        const [cpfUf, setCpfUf] = useState('');
        const [cpfResult, setCpfResult] = useState(null);
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');
        const estabelecimento = data?.estabelecimento || {};

        useEffect(() => {
          const params = new URLSearchParams(window.location.search);
          const isApprovingAccess = params.get('aprovar_acesso') === '1';
          const isApprovingPassword = params.get('aprovar_senha') === '1';
          if (!isApprovingAccess && !isApprovingPassword) return;
          const approvedEmail = normalizeEmail(params.get('email'));
          const approvedPassword = params.get('senha') || '';
          const approvedName = params.get('nome') || 'Usuario autorizado';
          if (!approvedEmail || !approvedPassword) {
            setAuthMessage('Link de liberacao incompleto. Confira o e-mail do pedido de acesso.');
            return;
          }
          saveUser({
            ...(getUser(approvedEmail) || {}),
            name: approvedName,
            email: approvedEmail,
            password: approvedPassword,
            note: isApprovingPassword ? 'Senha alterada por link aprovado pelo administrador.' : 'Liberado por link de aprovacao enviado ao administrador.',
            approvedBy: AUTH_EMAIL,
            createdAt: new Date().toISOString()
          });
          setAuthMode('login');
          setAuthEmail(approvedEmail);
          setAuthPassword('');
          setAuthMessage(isApprovingPassword
            ? 'Senha alterada para ' + approvedEmail + '. Agora esse usuario pode entrar com a nova senha aprovada.'
            : 'Acesso liberado para ' + approvedEmail + '. Agora esse usuario pode entrar com a senha cadastrada no pedido.');
          window.history.replaceState({}, document.title, window.location.pathname);
        }, []);

        async function handleSubmit(event) {
          event.preventDefault();
          const digits = onlyDigits(cnpj);
          setError('');
          if (digits.length !== 14) {
            setError('Digite um CNPJ valido com 14 numeros.');
            return;
          }
          setLoading(true);
          setData(null);
          try {
            const response = await fetch(`${API_URL}${digits}`);
            const payload = await response.json().catch(() => null);
            if (!response.ok) throw new Error(payload?.detalhes || payload?.message || 'Nao foi possivel consultar este CNPJ.');
            setData(payload);
          } catch (err) {
            setError(err.message || 'Erro inesperado ao consultar a API.');
          } finally {
            setLoading(false);
          }
        }

        function handleCpfSubmit(event) {
          event.preventDefault();
          setCpfResult(null);
          if (!isValidCpf(cpf)) {
            setCpfResult({
              tone: 'error',
              title: 'CPF invalido',
              message: 'Confira os 11 digitos do CPF antes de pesquisar a inscricao estadual.'
            });
            return;
          }
          setCpfResult({
            tone: 'info',
            title: 'CPF valido',
            message: 'A API publica da CNPJ.ws nao consulta inscricao estadual por CPF. Para contribuinte pessoa fisica ou produtor rural, confira no cadastro da SEFAZ/Sintegra da UF.'
          });
        }

        if (!isAuthenticated) {
          return (
            <LoginScreen
              authMode={authMode}
              setAuthMode={setAuthMode}
              authEmail={authEmail}
              setAuthEmail={setAuthEmail}
              authPassword={authPassword}
              setAuthPassword={setAuthPassword}
              authMessage={authMessage}
              setAuthMessage={setAuthMessage}
              onLogin={(email) => {
                setCurrentUserEmail(email);
                setIsAuthenticated(true);
              }}
            />
          );
        }

        return (
          <main className="min-h-screen bg-slate-100 text-slate-950">
            <section className="no-print border-b border-slate-200 bg-white">
              <div className="mx-auto flex w-full max-w-7xl flex-col gap-8 px-4 py-8 sm:px-6 lg:px-8">
                <div className="flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-wide text-cyan-700">Consulta publica</p>
                    <h1 className="mt-2 text-3xl font-bold tracking-tight text-slate-950 sm:text-4xl">Consulta CNPJ</h1>
                    <p className="mt-3 max-w-2xl text-base leading-7 text-slate-600">Gere um relatorio executivo corporativo com leitura contabil, societaria e operacional a partir dos dados publicos do CNPJ.</p>
                  </div>
                  <div className="flex flex-col gap-2 sm:flex-row sm:items-center">
                    <span className="rounded-md bg-slate-100 px-4 py-3 text-sm font-bold text-slate-700">{currentUserEmail || authEmail}</span>
                    <button type="button" onClick={() => { setIsAuthenticated(false); setCurrentUserEmail(''); setAuthPassword(''); }} className="rounded-md border border-slate-300 bg-white px-4 py-3 text-sm font-black text-slate-700 transition hover:bg-slate-100">Sair</button>
                  </div>
                </div>
                <div className="grid gap-4 lg:grid-cols-2">
                  <form onSubmit={handleSubmit} className="grid gap-3 rounded-lg border border-slate-200 bg-slate-50 p-3 shadow-sm sm:grid-cols-[1fr_auto]">
                    <label className="block">
                      <span className="mb-2 block text-sm font-medium text-slate-700">CNPJ</span>
                      <input value={cnpj} onChange={(event) => setCnpj(formatCnpj(event.target.value))} inputMode="numeric" placeholder="00.000.000/0000-00" className="h-12 w-full rounded-md border border-slate-300 bg-white px-4 text-lg font-semibold outline-none transition focus:border-cyan-600 focus:ring-4 focus:ring-cyan-100" />
                    </label>
                    <button type="submit" disabled={loading} className="mt-auto inline-flex h-12 items-center justify-center rounded-md bg-cyan-700 px-6 text-sm font-bold text-white transition hover:bg-cyan-800 disabled:cursor-not-allowed disabled:bg-slate-400">{loading ? 'Consultando...' : 'Consultar CNPJ'}</button>
                  </form>
                  <form onSubmit={handleCpfSubmit} className="grid gap-3 rounded-lg border border-slate-200 bg-slate-50 p-3 shadow-sm sm:grid-cols-[1fr_auto_auto]">
                    <label className="block">
                      <span className="mb-2 block text-sm font-medium text-slate-700">CPF do contribuinte</span>
                      <input value={cpf} onChange={(event) => setCpf(formatCpf(event.target.value))} inputMode="numeric" placeholder="000.000.000-00" className="h-12 w-full rounded-md border border-slate-300 bg-white px-4 text-lg font-semibold outline-none transition focus:border-amber-600 focus:ring-4 focus:ring-amber-100" />
                    </label>
                    <label className="block">
                      <span className="mb-2 block text-sm font-medium text-slate-700">UF</span>
                      <select value={cpfUf} onChange={(event) => setCpfUf(event.target.value)} className="h-12 w-full rounded-md border border-slate-300 bg-white px-3 text-sm font-semibold outline-none transition focus:border-amber-600 focus:ring-4 focus:ring-amber-100">
                        <option value="">UF</option>
                        {Object.keys(ufIeLinks).map((uf) => <option key={uf} value={uf}>{uf}</option>)}
                      </select>
                    </label>
                    <button type="submit" className="mt-auto inline-flex h-12 items-center justify-center rounded-md bg-amber-600 px-6 text-sm font-bold text-white transition hover:bg-amber-700">Verificar IE</button>
                  </form>
                </div>
                {error && <div className="rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-800">{error}</div>}
                {cpfResult && <div className={`rounded-lg border px-4 py-3 text-sm font-medium ${cpfResult.tone === 'error' ? 'border-rose-200 bg-rose-50 text-rose-800' : 'border-amber-200 bg-amber-50 text-amber-900'}`}><strong className="block text-base">{cpfResult.title}</strong><span className="mt-1 block leading-6">{cpfResult.message}</span>{cpfResult.tone !== 'error' && cpfUf && <a href={ufIeLinks[cpfUf]} target="_blank" rel="noreferrer" className="mt-3 inline-flex rounded-md bg-amber-700 px-4 py-2 text-sm font-bold text-white transition hover:bg-amber-800">Abrir consulta da SEFAZ/Sintegra {cpfUf}</a>}</div>}
              </div>
            </section>

            <section className="print-shell mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
              {loading && <div className="grid gap-4 md:grid-cols-3">{Array.from({ length: 6 }).map((_, i) => <div key={i} className="h-28 animate-pulse rounded-lg bg-white shadow-sm" />)}</div>}
              {!loading && !data && <div className="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center"><p className="text-lg font-semibold text-slate-800">Informe um CNPJ para iniciar a consulta.</p><p className="mt-2 text-sm text-slate-500">O resultado aparecera em formato de relatorio executivo corporativo.</p></div>}
              {data && (
                <ExecutiveReport data={data} cnpj={cnpj} />
              )}
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
